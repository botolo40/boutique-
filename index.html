<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Administration</title>
    <style>
        #contenu { margin-top: 20px; }
        #ajout-form { 
            margin-top: 20px;
            border: 1px solid #D2B48C; 
            padding: 15px; 
            background: #1e1e24; 
            display: none; 
            width: 80%; 
            border-radius: 20px;
        }
        #title-input {
            border-radius: 15px;
            background: #1c1c1e;
            border: 1px solid #D2B48C;
            color: white;
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        } 
        #texte-input {
            width: 100%;
            border-radius: 15px;
            background: #1c1c1e;
            color: white;
            border: 1px solid #D2B48C;
            padding: 8px;
            box-sizing: border-box;
        }   
        body, html {
            padding: 0;
            margin: 0;
        }
        body {
            background: #121212;
            color: #eee;
        }
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        footer {
            text-align: center;
        }
        h1 {
            color: #00F2ff;
            font-family: fantasy;
            font-size: 50px;
            text-align: center;
        }
        header {
            text-align: center;
            color: #eee;
            font-size: 30px;
            font-family: cursive;
            position: fixed;
            width: 100%;
            z-index: 1000;
            background: #1e1e24;
            padding: 10px 0;
        }
        #pointer {
            font-size: 30px;
            position: relative;
            left: 80px;
            cursor: pointer;
            color: #00F2ff;
        }
        .btn {
            background: #1c1c1e;
            border: 1px solid #D2B48C;
            width: 100px;
            height: 35px;
            border-radius: 25px;
            cursor: pointer;
        }
        /* Style pour chaque article */
        .item {
            margin: 20px 0;
            border: 1px solid #D2B48C;
            border-radius: 20px;
            background: #1e1e24;
            width: 280px;
            height: 500px;
            color: #ccc;
            text-align: center;
            position: relative;
            display: inline-block;
            vertical-align: top;
            margin: 10px;
        }
        .item .big-text {
            font-size: 35px;
            color: #D2B48C;
            font-weight: bold;
            margin: 10px 0;
        }
        .item img {
            vertical-align: top;
            margin-right: 10px;
            max-width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }
        #btn-div {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .action-buttons {
            margin-top: 10px;
            text-align: center;
        }
        .action-buttons button {
            background: #2a2a2a;
            border: 1px solid #D2B48C;
            color: white;
            border-radius: 5px;
            padding: 5px 10px;
            margin: 2px;
            cursor: pointer;
        }
        .options {
            margin-top: 10px;
            text-align: center;
        }
        #ajouter {
            background-color: transparent;
            border: 2px solid #D2B48C;
            color: #D2B48C;
            margin-bottom: 20px;
            height: 35px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <img style="border-radius:3000px;clip-path:circle(50% at 50% 50%);width:30px;height:30px; background:white; position:relative;right:85px;" src="https://i.ibb.co/C5hDb54V/126509.png" alt="">
        Boutique<span id="pointer"><b>&#8942</b></span>
    </header>
    <br><br><br> 
    <main>
        <h1>Achetez nos produits exceptionnels</h1>
        
        <button id="ajouter"><i class="fas fa-plus-circle"></i> Ajouter un élément</button>
        <div id="contenu"></div>





        <!-- Formulaire d'ajout -->
        <div id="ajout-form">
            <h3>Nouvel élément</h3>
            <textarea id="title-input" placeholder="Titre" required></textarea><br>
            <input type="file" id="image-input" accept="image/*"><br><br>
            <textarea id="texte-input" placeholder="Texte de l'article" rows="4" required></textarea><br><br>
            <button id="ajouter-element" style="background:#00FFAA;border:1px solid #00FFAA; border-radius:8px;width:80px; height:30px;">Publier</button>
            <button id="annuler" style="background:#FF4D4D;border:1px solid #FF4D4D; border-radius:8px;width:80px; height:30px;">Annuler</button>
        </div>
    </main>
    <br><br><br><br><br><br><br><br>
    <hr>
    <footer>
        All rights reserved.©2026<br>by <a href="botolo40.github.io/mindy/" style="color:#E6C200;">MindyEntreprise</a>
    </footer>

    <script>
        // 🔧 REMPLACEZ CETTE CLÉ PAR VOTRE VRAIE CLÉ API (sans points)
        const BIN_ID = '69b7fd00c3097a1dd52d4ef1';
        const API_KEY = '$2a$10$JRui1R/HR86PR7CN1SitdekmJGwxztWm92GNShHT/i...4sMbKlb.'; // <-- À CORRIGER

        const READ_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;
        const WRITE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        // Éléments DOM
        const boutonAjouter = document.getElementById('ajouter');
        const contenuDiv = document.getElementById('contenu');
        const ajoutForm = document.getElementById('ajout-form');
        const imageInput = document.getElementById('image-input');
        const titleInput = document.getElementById('title-input');
        const texteInput = document.getElementById('texte-input');
        const ajouterElement = document.getElementById('ajouter-element');
        const annuler = document.getElementById('annuler');

        const height = 320; // hauteur max de l'image

        let elements = []; // Tableau local des articles

        // Fonction pour formater une date ISO en chaîne lisible (locale)
        function formatDate(dateString) {
            if (!dateString) return 'date inconnue';
            try {
                const date = new Date(dateString);
                return date.toLocaleString();
            } catch (e) {
                return dateString; // fallback
            }
        }

        // Charger les données depuis JSONBin
        async function chargerDonnees() {
            try {
                const response = await fetch(READ_URL);
                const data = await response.json();
                elements = (data.record && data.record.articles) ? data.record.articles : [];
                afficherElements();
            } catch (error) {
                console.error('Erreur de chargement', error);
                elements = [];
                afficherElements();
            }
        }

        // Sauvegarder les données sur JSONBin
        async function sauvegarderDonnees() {
            try {
                const response = await fetch(WRITE_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify({ articles: elements })
                });
                if (!response.ok) {
                    throw new Error(`Erreur HTTP ${response.status}`);
                }
                return true;
            } catch (error) {
                alert('Erreur lors de la sauvegarde : ' + error.message);
                return false;
            }
        }

        // Afficher tous les éléments (triés par date décroissante)
        function afficherElements() {
            // Trier du plus récent au plus ancien
            elements.sort((a, b) => {
                const dateA = a.date ? new Date(a.date) : new Date(0);
                const dateB = b.date ? new Date(b.date) : new Date(0);
                return dateB - dateA; // décroissant : récent d'abord
            });

            contenuDiv.innerHTML = '';
            elements.forEach((element, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item';
                // Utilisation de la date formatée
                const dateLisible = formatDate(element.date);
                itemDiv.innerHTML = `
                    <!-- Grand texte coloré -->
                    <div class="big-text">${element.texte}</div>
                    <!-- Carte produit -->
                    <div style="border-radius:20px; border:1px solid #D2B48C; background:#1e1e24; width:280px; height:500px; color:#ccc; text-align:center; position:relative;">
                        <br><br><br>
                        <img src="${element.image}" height="${element.height}" style="vertical-align:top; margin-right:10px;">
                        <p><strong>${element.texte}</strong></p>
                        <p><small>Publié le ${dateLisible}</small></p>
                        <p>Contactez la personne qui vend!</p>
                        <div id="btn-div">
                            <button class="btn"><i class="fas fa-phone" style="color:#D2B48C; font-size:25px;"></i></button>
                            <button class="btn"><i class="fas fa-share-alt" style="font-size:25px; color:#D2B48C;"></i></button>
                        </div>
                    </div>
                    <!-- Boutons d'administration -->
                    <div class="action-buttons">
                        <button onclick="modifierElement(${index})"><i class="fas fa-edit"></i> Modifier</button>
                        <button onclick="supprimerElement(${index})"><i class="fas fa-trash"></i> Supprimer</button>
                    </div>
                    <div id="options-${index}" class="options" style="display:none; margin-top:10px;">
                        <button onclick="modifierTexte(${index})">Modifier le texte</button>
                        <button onclick="modifierImage(${index})">Modifier l'image</button>
                    </div>
                `;
                contenuDiv.appendChild(itemDiv);
            });
        }

        // Fonctions globales (nécessaires pour les boutons dans innerHTML)
        window.modifierElement = function(index) {
            const options = document.getElementById(`options-${index}`);
            options.style.display = options.style.display === 'none' ? 'block' : 'none';
        };

        window.modifierTexte = async function(index) {
            const nouveauTexte = prompt('Nouveau texte :', elements[index].texte);
            if (nouveauTexte !== null) {
                elements[index].texte = nouveauTexte;
                if (await sauvegarderDonnees()) {
                    afficherElements();
                }
            }
        };

        window.modifierImage = async function(index) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const fichier = e.target.files[0];
                const lecteur = new FileReader();
                lecteur.onload = async (ev) => {
                    elements[index].image = ev.target.result;
                    if (await sauvegarderDonnees()) {
                        afficherElements();
                    }
                };
                lecteur.readAsDataURL(fichier);
            };
            input.click();
        };

        window.supprimerElement = async function(index) {
            if (confirm('Supprimer cet élément ?')) {
                elements.splice(index, 1);
                if (await sauvegarderDonnees()) {
                    afficherElements();
                }
            }
        };

        // Gestion du formulaire d'ajout
        boutonAjouter.addEventListener('click', () => {
            ajoutForm.style.display = 'block';
        });

        annuler.addEventListener('click', () => {
            ajoutForm.style.display = 'none';
            imageInput.value = '';
            texteInput.value = '';
            titleInput.value = '';
        });

        ajouterElement.addEventListener('click', async () => {
            const fichier = imageInput.files[0];
            if (!fichier) {
                alert('Veuillez sélectionner une image.');
                return;
            }
            const lecteur = new FileReader();
            lecteur.onload = async (e) => {
                const imageUrl = e.target.result;
                const titre = titleInput.value.trim() || 'Sans titre';
                const texte = texteInput.value.trim() || '(sans description)';
                const nouvelElement = {
                    image: imageUrl,
                    title: titre,
                    texte: texte,
                    date: new Date().toISOString(), // stockage ISO pour tri fiable
                    height: height
                };
                elements.push(nouvelElement);
                if (await sauvegarderDonnees()) {
                    afficherElements();
                    ajoutForm.style.display = 'none';
                    imageInput.value = '';
                    texteInput.value = '';
                    titleInput.value = '';
                } else {
                    elements.pop(); // annuler en cas d'échec
                }
            };
            lecteur.readAsDataURL(fichier);
        });

        // Initialisation
        chargerDonnees();
    </script>
</body>
</html>
